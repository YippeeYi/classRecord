<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编日史 · 抽卡</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
    <link rel="preload" href="fonts/GoogleSansFlex/GoogleSansFlex-VariableFont_GRAD,ROND,opsz,slnt,wdth,wght.ttf" as="font"
        type="font/ttf">
    <script src="js/authGate.js"></script>
    <script src="js/navigation.js"></script>
</head>

<body class="feature-page gacha-page">
    <div class="page-header">
        <button class="back-to-guide-btn" aria-label="返回主页" title="返回主页" data-nav-target="index.html">←</button>
    </div>

    <main class="feature-shell">
        <section class="feature-hero">
            <p class="feature-eyebrow">Wish Screen</p>
            <h1>星辉抽卡</h1>
            <p class="feature-summary">单抽或十连后会进入独立祈愿展示页。十连会逐张揭示，也可以跳过并直接查看全部卡片。</p>
            <div class="feature-balance-row">
                <div class="balance-chip">
                    <span>当前 Q币</span>
                    <strong><span data-qcoin-balance>0</span></strong>
                </div>
                <div class="balance-chip">
                    <span id="gacha-pity-4">10 抽内保底 4 星</span>
                    <strong id="gacha-pity-5">90 抽内保底 5 星</strong>
                </div>
            </div>
            <div class="gacha-actions">
                <button class="btn-action gacha-draw-btn" type="button" data-gacha-count="1">单抽</button>
                <button class="btn-action gacha-draw-btn" type="button" data-gacha-count="10">十连</button>
            </div>
        </section>

        <section id="gacha-empty-state" class="asset-hint-panel">
            <h2>等待你的卡面图</h2>
            <p>卡池数据已经接好。把图片和卡池信息补到 <code>data/gacha/pool.json</code> 后，这里就会自动变成正式抽卡池。</p>
        </section>

        <section id="gacha-result-stage" class="wish-stage">
            <div class="wish-stage-bg"></div>
            <div id="gacha-result-grid" class="wish-grid"></div>
        </section>

        <section class="gacha-columns">
            <article class="gacha-panel">
                <h2>最近获得</h2>
                <ul id="gacha-history" class="gacha-history"></ul>
            </article>
            <article class="gacha-panel">
                <h2>收藏仓库</h2>
                <div id="gacha-collection" class="collection-grid"></div>
            </article>
        </section>
    </main>

    <section id="wish-reveal-screen" class="wish-reveal-screen" aria-live="polite" hidden>
        <div class="wish-reveal-sky"></div>
        <div class="wish-reveal-stars"></div>
        <div id="wish-reveal-meteor" class="wish-reveal-meteor"></div>
        <div class="wish-reveal-flash"></div>

        <div class="wish-reveal-topbar">
            <button id="wish-reveal-close" class="wish-ghost-btn" type="button" hidden>返回</button>
            <button id="wish-reveal-skip" class="wish-ghost-btn" type="button">跳过</button>
        </div>

        <div id="wish-reveal-card-wrap" class="wish-reveal-card-wrap"></div>
        <div id="wish-reveal-summary" class="wish-reveal-summary" hidden>
            <div class="wish-summary-head">
                <p class="feature-eyebrow">Wish Result</p>
                <h2>祈愿结果</h2>
            </div>
            <div id="wish-reveal-summary-grid" class="wish-summary-grid"></div>
        </div>

        <button id="wish-reveal-next" class="wish-next-hit" type="button" aria-label="继续展示下一张卡"></button>
        <p id="wish-reveal-hint" class="wish-reveal-hint">星轨正在划过夜空...</p>
    </section>

    <script src="js/gameSystem.js"></script>
    <script src="js/backgroundOptions.js"></script>
    <script src="js/backgroundSwitcher.js"></script>
    <script src="js/gachaApp.js"></script>
</body>

</html>
