<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编日史 · 导览</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
    <link rel="preload" href="fonts/GoogleSansFlex/GoogleSansFlex-VariableFont_GRAD,ROND,opsz,slnt,wdth,wght.ttf" as="font"
        type="font/ttf">
    <script src="js/authGate.js"></script>
    <script src="js/navigation.js"></script>
</head>

<body class="guide-page">
    <div class="top-right-actions">
        <button id="refresh-cache-btn" class="top-action-btn btn-action">🧹 清空缓存</button>
        <button id="clear-access-btn" class="top-action-btn btn-action">🔒 移除密钥</button>
        <button class="top-action-btn btn-action" onclick="window.open('docs/record-format.html', '_blank', 'noopener')">📄 记录格式说明</button>
    </div>

    <main class="guide-main">
        <section class="wallet-banner">
            <p class="wallet-banner-label">Q币账户</p>
            <p class="wallet-banner-value"><span data-qcoin-balance>0</span> Q币</p>
            <p class="wallet-banner-note">答题得币，解锁重要条目，或去抽卡。</p>
        </section>
        <img class="guide-logo" src="logo-guide.png" alt="编日史 logo">

        <div id="guide-progress" class="guide-progress" hidden>
            <div class="guide-progress-track">
                <div id="guide-progress-fill" class="guide-progress-fill"></div>
            </div>
            <p id="guide-progress-text" class="guide-progress-text">缓存加载中 0%</p>
        </div>

        <section id="guide-highlights" class="guide-highlights" hidden>
            <h2>📊 档案速览</h2>
            <div class="guide-stats-grid">
                <article class="guide-stat-card guide-stat-link" data-target="record.html" role="link" tabindex="0"
                    aria-label="跳转到记录页面">
                    <p class="guide-stat-label">记录条目</p>
                    <p id="guide-record-count" class="guide-stat-value">--</p>
                </article>
                <article class="guide-stat-card guide-stat-link" data-target="people.html" role="link" tabindex="0"
                    aria-label="跳转到人物名单页面">
                    <p class="guide-stat-label">人物条目</p>
                    <p id="guide-people-count" class="guide-stat-value">--</p>
                </article>
                <article class="guide-stat-card guide-stat-link" data-target="glossary.html" role="link" tabindex="0"
                    aria-label="跳转到术语页面">
                    <p class="guide-stat-label">术语条目</p>
                    <p id="guide-term-count" class="guide-stat-value">--</p>
                </article>
                <article class="guide-stat-card">
                    <p class="guide-stat-label">最新记录日期</p>
                    <p id="guide-latest-date" class="guide-stat-value guide-stat-date">--</p>
                </article>
            </div>
            <p id="guide-tip" class="guide-tip">💡 小提示：人物页支持多维排序，适合快速找人。</p>
        </section>

        <section class="guide-feature-grid">
            <article class="guide-feature-card guide-stat-link" data-target="quiz.html" role="link" tabindex="0">
                <p class="guide-feature-kicker">Q币来源</p>
                <h2>编日史答题</h2>
                <p>四选一答题，答对一题获得 100 Q币。</p>
            </article>
            <article class="guide-feature-card guide-stat-link" data-target="gacha.html" role="link" tabindex="0">
                <p class="guide-feature-kicker">Q币去向</p>
                <h2>星辉抽卡</h2>
                <p>160 Q币 单抽，1600 Q币 十连，支持 3/4/5 星展示与收藏。</p>
            </article>
        </section>

    </main>

    <script src="js/cacheLoader.js"></script>
    <script src="js/recordStore.js"></script>
    <script src="js/peopleStore.js"></script>
    <script src="js/glossaryStore.js"></script>
    <script src="js/gameSystem.js"></script>
    <script src="js/backgroundOptions.js"></script>
    <script src="js/backgroundSwitcher.js"></script>
    <script src="js/guide.js"></script>
    <script src="js/authControls.js"></script>
</body>

</html>
